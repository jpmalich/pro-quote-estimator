server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React-router SPA: serve index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the service worker or the HTML shell.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Hashed build assets can cache forever.
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
